name: .NET 10 Windows CI

# on:
#   push:
#     branches: [ "main" ]
#   pull_request:
#     branches: [ "main" ]

on: 
  push: 
      tags:
        - v**

jobs:
  build:
    name: Build, Publish & Package MSI
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # WiX 5 CLI'yi global tool olarak kur
    - name: Install WiX Toolset
      run: dotnet tool install --global wix --version 5.0.2

    # WiX UI extension'ı ekle
    - name: Add WiX UI Extension
      run: wix extension add WixToolset.UI.wixext/5.0.2

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --configuration Release --no-restore

    # Publish çıktısını /publish klasörüne al
    - name: Publish Solution
      run: >
        dotnet publish -c Release -r win-x64
        --self-contained true
        -o publish

    # Tag'den versiyon numarasını çıkar (v1.2.3 → 1.2.3)
    - name: Extract Version
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    # MSI oluştur
    - name: Build MSI
      working-directory: installer
      env:
        RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
      run: wix build Product.wxs -ext WixToolset.UI.wixext -o ../NSI2000Cli-Setup-${{ steps.version.outputs.VERSION }}.msi

    - name: Run Tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    # GitHub Release oluştur ve MSI'yi yükle
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "NSI2000Cli ${{ github.ref_name }}"
        draft: false
        prerelease: false
        files: |
          NSI2000Cli-Setup-${{ steps.version.outputs.VERSION }}.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
